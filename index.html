<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Olimpiadas TP - En Vivo 🏆</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <header class="bg-gradient-to-r from-indigo-800 to-purple-900 py-6 text-center shadow-lg">
        <h1 class="text-3xl font-extrabold tracking-wider text-white">OLIMPIADAS TP</h1>
        <p class="text-indigo-200 text-xs mt-1 uppercase tracking-widest">Resultados desde Google Sheets en Vivo</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 space-y-12">
        <section class="grid md:grid-cols-2 gap-8">
            <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-xl">
                <h3 class="text-lg font-bold text-blue-400 mb-4">📊 GRUPO A</h3>
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-700 text-gray-300 text-xs uppercase">
                        <tr>
                            <th class="p-3 rounded-l-lg">Equipo</th>
                            <th class="p-3 text-center">PJ</th>
                            <th class="p-3 text-center">GD</th>
                            <th class="p-3 text-center text-blue-300 rounded-r-lg font-bold">PTS</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-a" class="divide-y divide-gray-700">
                        <tr><td colspan="4" class="text-center py-4 text-gray-500">Cargando posiciones...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-xl">
                <h3 class="text-lg font-bold text-orange-400 mb-4">📊 GRUPO B</h3>
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-700 text-gray-300 text-xs uppercase">
                        <tr>
                            <th class="p-3 rounded-l-lg">Equipo</th>
                            <th class="p-3 text-center">PJ</th>
                            <th class="p-3 text-center">GD</th>
                            <th class="p-3 text-center text-orange-300 rounded-r-lg font-bold">PTS</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-b" class="divide-y divide-gray-700">
                        <tr><td colspan="4" class="text-center py-4 text-gray-500">Cargando posiciones...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl">
            <h2 class="text-2xl font-bold text-teal-400 mb-6 border-b border-gray-700 pb-2">📅 Calendario de Partidos</h2>
            <div class="grid md:grid-cols-2 gap-4" id="lista-partidos">
                </div>
        </section>

        <section class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl">
            <h2 class="text-2xl font-bold text-purple-400 mb-6 border-b border-gray-700 pb-2">🔥 Playoffs Finales</h2>
            <div class="grid md:grid-cols-3 gap-6" id="fase-final">
                </div>
        </section>
    </main>

    <audio id="musica-torneo" loop autoplay>
        <source src="background-music.mp3" type="audio/mpeg">
    </audio>

    <button id="btn-musica" class="fixed bottom-6 right-6 bg-purple-600 hover:bg-purple-700 text-white p-4 rounded-full shadow-2xl z-50 flex items-center justify-center transition-all transform hover:scale-110" onclick="controlarMusica()">
        <svg id="icono-play" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <svg id="icono-pausa" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
    </button>

    <script>
        // 🛠️ REEMPLAZA ESTO CON TU ID REAL DE SPREADSHEET
        const HOJA_ID = "TU_ID_DE_GOOGLE_SHEETS_AQUÍ"; 
        const URL_CSV = `https://docs.google.com/spreadsheets/d/${HOJA_ID}/pub?output=csv`;

        async function consultarExcel() {
            try {
                const respuesta = await fetch(URL_CSV);
                const textoCsv = await respuesta.text();
                const filas = textoCsv.split("\n").map(fila => fila.split(","));
                procesarDatosTorneo(filas);
            } catch (error) {
                console.error("Error leyendo el Excel:", error);
            }
        }

        function procesarDatosTorneo(filas) {
            // GRUPO A
            const tbodyA = document.getElementById('tabla-a');
            tbodyA.innerHTML = `
                <tr class="hover:bg-gray-700/30"><td class="p-3 font-semibold">${filas[1]?.[0] || 'G1'}</td><td class="text-center">${filas[1]?.[1] || 0}</td><td class="text-center">${filas[1]?.[2] || 0}</td><td class="text-center font-bold text-blue-300">${filas[1]?.[3] || 0}</td></tr>
                <tr class="hover:bg-gray-700/30"><td class="p-3 font-semibold">${filas[2]?.[0] || 'g3'}</td><td class="text-center">${filas[2]?.[1] || 0}</td><td class="text-center">${filas[2]?.[2] || 0}</td><td class="text-center font-bold text-blue-300">${filas[2]?.[3] || 0}</td></tr>
                <tr class="hover:bg-gray-700/30"><td class="p-3 font-semibold">${filas[3]?.[0] || 'check-in'}</td><td class="text-center">${filas[3]?.[1] || 0}</td><td class="text-center">${filas[3]?.[2] || 0}</td><td class="text-center font-bold text-blue-300">${filas[3]?.[3] || 0}</td></tr>
            `;

            // GRUPO B
            const tbodyB = document.getElementById('tabla-b');
            tbodyB.innerHTML = `
                <tr class="hover:bg-gray-700/30"><td class="p-3 font-semibold">${filas[5]?.[0] || 'G2'}</td><td class="text-center">${filas[5]?.[1] || 0}</td><td class="text-center">${filas[5]?.[2] || 0}</td><td class="text-center font-bold text-orange-300">${filas[5]?.[3] || 0}</td></tr>
                <tr class="hover:bg-gray-700/30"><td class="p-3 font-semibold">${filas[6]?.[0] || 'Sonido'}</td><td class="text-center">${filas[6]?.[1] || 0}</td><td class="text-center">${filas[6]?.[2] || 0}</td><td class="text-center font-bold text-orange-300">${filas[6]?.[3] || 0}</td></tr>
                <tr class="hover:bg-gray-700/30"><td class="p-3 font-semibold">${filas[7]?.[0] || '3-4'}</td><td class="text-center">${filas[7]?.[1] || 0}</td><td class="text-center">${filas[7]?.[2] || 0}</td><td class="text-center font-bold text-orange-300">${filas[7]?.[3] || 0}</td></tr>
            `;

            // RENDER CALENDARIO DE PARTIDOS (Filas 17 a 22)
            const divPartidos = document.getElementById('lista-partidos');
            divPartidos.innerHTML = "";
            for (let i = 16; i <= 21; i++) {
                if (!filas[i]) continue;
                const loc = filas[i][0] || 'Por definir';
                const marcL = filas[i][1] !== undefined ? filas[i][1].trim() : '-';
                const vis = filas[i][2] || 'Por definir';
                const marcV = filas[i][3] !== undefined ? filas[i][3].trim() : '-';
                // Usamos la columna E si existe, si no ponemos por defecto Partido
                const infoExtra = filas[i][4] ? filas[i][4].trim() : `Partido ${i-15}`;

                divPartidos.innerHTML += `
                    <div class="bg-gray-900/40 border border-gray-700 rounded-lg p-3.5 flex justify-between items-center transition hover:border-teal-500/50">
                        <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">${infoExtra}</span>
                        <div class="flex items-center gap-3">
                            <span class="text-sm font-medium text-right min-w-[70px]">${loc}</span>
                            <span class="bg-gray-950 text-yellow-400 font-mono text-xs px-2 py-1 rounded font-black border border-gray-800">${marcL} : ${marcV}</span>
                            <span class="text-sm font-medium text-left min-w-[70px]">${vis}</span>
                        </div>
                    </div>
                `;
            }

            // FASE FINAL
            const divFinal = document.getElementById('fase-final');
            divFinal.innerHTML = `
                <div class="bg-gray-700/40 p-4 rounded-xl border border-gray-600">
                    <span class="text-xs font-bold text-purple-400 block mb-2">SEMIFINAL 1</span>
                    <div class="flex justify-between text-sm"><span>${filas[10]?.[0] || '1A'}</span><span class="font-bold text-yellow-400">${filas[10]?.[1] || '-'}</span></div>
                    <div class="flex justify-between text-sm mt-1"><span>${filas[10]?.[2] || '2B'}</span><span class="font-bold text-yellow-400">${filas[10]?.[3] || '-'}</span></div>
                </div>
                <div class="bg-gray-700/40 p-4 rounded-xl border border-gray-600">
                    <span class="text-xs font-bold text-purple-400 block mb-2">SEMIFINAL 2</span>
                    <div class="flex justify-between text-sm"><span>${filas[11]?.[0] || '1B'}</span><span class="font-bold text-yellow-400">${filas[11]?.[1] || '-'}</span></div>
                    <div class="flex justify-between text-sm mt-1"><span>${filas[11]?.[2] || '2A'}</span><span class="font-bold text-yellow-400">${filas[11]?.[3] || '-'}</span></div>
                </div>
                <div class="border-2 border-purple-500 bg-gradient-to-br from-purple-950/20 to-gray-800 p-4 rounded-xl">
                    <span class="text-xs font-bold text-yellow-400 block mb-2">🏆 GRAN FINAL</span>
                    <div class="flex justify-between text-sm"><span>${filas[13]?.[0] || 'Ganador S1'}</span><span class="font-bold text-green-400">${filas[13]?.[1] || '-'}</span></div>
                    <div class="flex justify-between text-sm mt-1"><span>${filas[13]?.[2] || 'Ganador S2'}</span><span class="font-bold text-green-400">${filas[13]?.[3] || '-'}</span></div>
                </div>
            `;
        }

        // CONTROL DE MÚSICA
        const musica = document.getElementById('musica-torneo');
        const iconoPlay = document.getElementById('icono-play');
        const iconoPausa = document.getElementById('icono-pausa');
        musica.volume = 0.3;

        function controlarMusica() {
            if (musica.paused) {
                musica.play(); iconoPlay.classList.add('hidden'); iconoPausa.classList.remove('hidden');
            } else {
                musica.pause(); iconoPlay.classList.remove('hidden'); iconoPausa.classList.add('hidden');
            }
        }
        function iniciarAutoplay() {
            musica.play().then(() => {
                iconoPlay.classList.add('hidden'); iconoPausa.classList.remove('hidden');
            }).catch(() => {});
            document.removeEventListener('click', iniciarAutoplay);
        }

        document.addEventListener('DOMContentLoaded', () => {
            consultarExcel();
            setInterval(consultarExcel, 15000);
            document.addEventListener('click', iniciarAutoplay);
        });
    </script>
</body>
</html>
